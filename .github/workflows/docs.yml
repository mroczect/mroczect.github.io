name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download RawSSG
        run: |
          TAG=$(curl -s https://api.github.com/repos/mroczect/rawssg/releases/latest | jq -r .tag_name)
          curl -fsSL "https://github.com/mroczect/rawssg/releases/download/$TAG/rawssg-ubuntu-latest.tar.gz" -o rawssg.tar.gz
          tar -xzf rawssg.tar.gz
          chmod +x rawssg
          sudo mv rawssg /usr/local/bin/

      - name: Build site
        run: rawssg compile

      - name: List dist contents (debug)
        run: ls -la dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
